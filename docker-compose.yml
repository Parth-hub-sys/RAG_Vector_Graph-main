version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: rag-neo4j
    environment:
      NEO4J_AUTH: neo4j/your_secure_password_here
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_maxSize: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP browser UI
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - rag-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  rag-network:
    driver: bridge
